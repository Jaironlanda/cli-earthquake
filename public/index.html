<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Earthquake CLI</title>
		<meta
			name="description"
			content="A web-based terminal over live earthquake data."
		/>

		<!--
			xterm.js is loaded from a CDN to match this project's no-build-step
			convention (static assets in public/, no bundler). The global builds
			expose window.Terminal and window.FitAddon.
		-->
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css"
		/>
		<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>

		<!--
			MapLibre GL JS renders the earthquake map panel (Phase 6); the Protomaps
			basemaps helper builds the vector-tile style when a key is configured.
			Both are global builds (window.maplibregl / window.basemaps), matching
			the project's no-build-step CDN convention.
		-->
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/maplibre-gl@5.24.0/dist/maplibre-gl.css"
		/>
		<script src="https://cdn.jsdelivr.net/npm/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/@protomaps/basemaps@5/dist/basemaps.js"></script>

		<link rel="stylesheet" href="/styles.css" />
	</head>
	<body>
		<div id="app">
			<header id="titlebar">
				<span class="brand">🌏 Earthquake CLI</span>
				<span id="status" class="status status--connecting">
					<span class="status__dot"></span>
					<span class="status__label">connecting…</span>
				</span>
			</header>
			<main id="split">
				<!-- xterm.js mounts here -->
				<section id="terminal" aria-label="Terminal"></section>
				<!-- MapLibre GL mounts here (Phase 6). -->
				<section id="map" aria-label="Earthquake map"></section>
			</main>
		</div>

		<script src="/map.js"></script>
		<script type="module" src="/app.js"></script>
	</body>
</html>
